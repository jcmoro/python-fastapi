services:
  api:
    build: .
    container_name: catalog-api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./main.py:/app/main.py
      - ./pyproject.toml:/app/pyproject.toml
    environment:
      ENV: dev
      LOG_LEVEL: DEBUG
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
